const DB_NAME = 'WearCalcPhotosDB';
const DB_VERSION = 1;
const STORE_NAME = 'photos';

let db = null;

function initIndexedDB() {
    return new Promise((resolve, reject) => {
        if (db && db.name === DB_NAME) {
            resolve(db);
            return;
        }
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => {
            db = request.result;
            resolve(db);
        };
        request.onupgradeneeded = (event) => {
            const dbUpgrade = event.target.result;
            if (!dbUpgrade.objectStoreNames.contains(STORE_NAME)) {
                dbUpgrade.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
            }
        };
    });
}

// Сохранить Blob фото, вернуть ID
async function savePhotoBlob(blob) {
    await initIndexedDB();
    return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.add({ blob: blob });
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

// Получить Blob по ID
async function getPhotoBlob(id) {
    await initIndexedDB();
    return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readonly');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.get(id);
        request.onsuccess = () => resolve(request.result ? request.result.blob : null);
        request.onerror = () => reject(request.error);
    });
}

// Удалить фото по ID
async function deletePhotoBlob(id) {
    await initIndexedDB();
    return new Promise((resolve, reject) => {
        const transaction = db.transaction([STORE_NAME], 'readwrite');
        const store = transaction.objectStore(STORE_NAME);
        const request = store.delete(id);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
    });
}

// Структура данных для систем (инженерные + кровля)

    gvs: { name: "ГВС", defectLib: DEFECT_LIB.water, elements: [] },
    heat: { name: "Отопление", defectLib: DEFECT_LIB.water, elements: [] },
    sewer: { name: "Канализация", defectLib: DEFECT_LIB.sewer, elements: [] },
    elec: { name: "Электроснабжение", defectLib: DEFECT_LIB.elec, elements: [] },
    roof: { name: "Кровля", defectLib: DEFECT_LIB.roof.rolled, elements: [], roofType: "rolled" }
};

// Сохранение в localStorage
function saveToLocal() {
    let store = {};
    for (let k in systemsData) {
        store[k] = { elements: systemsData[k].elements, roofType: systemsData[k].roofType };
    }
    localStorage.setItem('wearCalcData', JSON.stringify(store));
}
// Загрузка из localStorage
function loadFromLocal() {
    let raw = localStorage.getItem('wearCalcData');
    if (raw) {
        try {
            let store = JSON.parse(raw);
            for (let k in store) {
                if (systemsData[k]) {
                    systemsData[k].elements = store[k].elements || [];
                    if (store[k].roofType) systemsData[k].roofType = store[k].roofType;
                    if (k === 'roof') systemsData.roof.defectLib = DEFECT_LIB.roof[systemsData.roof.roofType] || DEFECT_LIB.roof.rolled;
                }
            }
        } catch(e) {}
    }
}

// Очистка всех систем
function clearAllSystems() {
    for (let k in systemsData) {
        systemsData[k].elements = [];
        if (k === 'roof') { systemsData.roof.roofType = "rolled"; systemsData.roof.defectLib = DEFECT_LIB.roof.rolled; }
    }
    saveToLocal();
    renderAllSystems();
}
// Очистка текущей системы
function clearCurrentSystem() {
    const activeTab = document.querySelector('.tab-btn.active').getAttribute('data-tab');
    let sysKey = '';
    if (activeTab === 'tab1') sysKey = 'hvs';
    else if (activeTab === 'tab2') sysKey = 'gvs';
    else if (activeTab === 'tab3') sysKey = 'heat';
    else if (activeTab === 'tab4') sysKey = 'sewer';
    else if (activeTab === 'tab5') sysKey = 'elec';
    else if (activeTab === 'tab6') sysKey = 'roof';
    if (sysKey) {
        systemsData[sysKey].elements = [];
        if (sysKey === 'roof') { systemsData.roof.roofType = "rolled"; systemsData.roof.defectLib = DEFECT_LIB.roof.rolled; }
        saveToLocal();
        renderSystem(sysKey, `${sysKey}-root`);
    }
}

    location.reload(); 
}

// Получить значение Фi по интервалу (среднее для автоматического выбора)
function getDefaultFiByInterval(interval) {
    if (interval === "0–20") return 10;
    if (interval === "21–40") return 30.5;
    if (interval === "41–60") return 50.5;
    if (interval === "61–80") return 70.5;
    return 10;
}
// Получить Фi для дефекта (с учётом ручного ввода)
function getFiForPart(part, defectLib, defectIdx) {
    if (part.customFi !== undefined && part.customFi !== null && !isNaN(part.customFi)) return part.customFi;
    let defect = defectLib[defectIdx];
    if (defect && defect.interval && defect.interval !== "---") return getDefaultFiByInterval(defect.interval);
    return 10;
}
// Установить границу (нижнюю, среднюю, верхнюю) для дефекта
function setFiBoundary(part, defectLib, defectIdx, boundary) {
    let defect = defectLib[defectIdx];
    if (!defect || !defect.interval || defect.interval === "---") return;
    let parts = defect.interval.split("–");
    if (parts.length !== 2) return;
    let low = parseFloat(parts[0]);
    let high = parseFloat(parts[1]);
    if (isNaN(low) || isNaN(high)) return;
    let val;
    if (boundary === 'lower') val = low;
    else if (boundary === 'upper') val = high;
    else val = (low + high) / 2;
    part.customFi = val;
    saveToLocal();
}

// Вычисление статистики по системе (сумма уникальных Pк, сумма Фi*Pi)
function computeSystemStats(sys) {
    let totalFiPi = 0, uniquePkSum = 0;
    for (let elem of sys.elements) {
        uniquePkSum += elem.totalSize;
        for (let part of elem.parts) {
            let fi = getFiForPart(part, sys.defectLib, part.defectIdx);
            totalFiPi += fi * part.defectSize;
        }
    }
    let rawWear = uniquePkSum ? totalFiPi / uniquePkSum : 0;
    let roundedWear = Math.round(rawWear);
    let category = "";
    if (roundedWear <= 30) category = "1-я категория (капремонт не требуется)";
    else if (roundedWear <= 50) category = "2-я категория (капремонт в течение 5 лет)";
    else if (roundedWear <= 65) category = "3-я категория (приоритетный капремонт до 3 лет)";
    else category = "4-я категория (требуется инструментальное обследование)";
    return { totalFiPi, uniquePkSum, rawWear, roundedWear, category };
}

// ======================== ЧАСТЬ 3: ФУНКЦИИ РАБОТЫ С ФОТОГРАФИЯМИ (INDEXEDDB) И ОТРИСОВКА ТАБЛИЦ ========================

// Глобальная переменная для текущего контекста модалки
let currentPhotoContext = null;

// Открыть модальное окно для фотографий (с индикатором загрузки)
async function openPhotoModal(sysKey, eIdx, pIdx) {
    const sys = systemsData[sysKey];
    const part = sys.elements[eIdx].parts[pIdx];
    const modal = document.getElementById('photoModal');
    const galleryDiv = document.getElementById('modalPhotoGallery');
    const countSpan = document.getElementById('photoCount');
    const loadingDiv = document.getElementById('modalLoading');
    const closeSpan = modal.querySelector('.close');
    const addBtnElem = document.getElementById('modalAddPhotoBtn');
    
    currentPhotoContext = { sysKey, eIdx, pIdx };
    
    // Функция отрисовки галереи (асинхронная, подгружает Blob по ID)
    async function renderGallery() {
        galleryDiv.innerHTML = '';
        if (part.photoIds && part.photoIds.length) {
            for (let idx = 0; idx < part.photoIds.length; idx++) {
                const photoId = part.photoIds[idx];
                const blob = await getPhotoBlob(photoId);
                if (blob) {
                    const url = URL.createObjectURL(blob);
                    const card = document.createElement('div');
                    card.className = 'photo-card';
                    const img = document.createElement('img');
                    img.src = url;
                    img.style.maxWidth = '100%';
                    img.style.cursor = 'pointer';
                    img.onclick = () => window.open(url);
                    const delBtn = document.createElement('button');
                    delBtn.textContent = 'Удалить';
                    delBtn.onclick = async (e) => {
                        e.stopPropagation();
                        // Удаляем из IndexedDB
                        await deletePhotoBlob(photoId);
                        // Удаляем из массива part.photoIds
                        part.photoIds.splice(idx, 1);
                        saveToLocal();
                        await renderGallery(); // обновляем галерею
                        renderSystem(sysKey, `${sysKey}-root`); // обновить таблицу
                    };
                    card.appendChild(img);
                    card.appendChild(delBtn);
                    galleryDiv.appendChild(card);
                }
            }
        } else {
            galleryDiv.innerHTML = '<p>Нет фотографий</p>';
        }
        countSpan.textContent = part.photoIds ? part.photoIds.length : 0;
    }
    
    // Первоначальная отрисовка
    await renderGallery();
    
    // Обработчик добавления фотографий (с блокировкой)
    if (addBtnElem) {
        const newAddBtn = addBtnElem.cloneNode(true);
        addBtnElem.parentNode.replaceChild(newAddBtn, addBtnElem);
        newAddBtn.onclick = async () => {
            const fileInput = document.createElement('input');
            fileInput.type = 'file';
            fileInput.accept = 'image/*';
            fileInput.multiple = true;
            fileInput.onchange = async (e) => {
                const files = Array.from(fileInput.files);
                if (files.length === 0) return;
                
                // Блокируем интерфейс
                if (closeSpan) { closeSpan.style.pointerEvents = 'none'; closeSpan.style.opacity = '0.5'; }
                if (loadingDiv) loadingDiv.style.display = 'block';
                newAddBtn.disabled = true;
                newAddBtn.textContent = '⏳ Загрузка...';
                
                for (const file of files) {
                    // Сохраняем Blob в IndexedDB
                    const photoId = await savePhotoBlob(file);
                    if (!part.photoIds) part.photoIds = [];
                    part.photoIds.push(photoId);
                    saveToLocal();
                    await renderGallery();      // обновить галерею
                    renderSystem(sysKey, `${sysKey}-root`); // обновить таблицу
                }
                
                // Разблокируем
                if (closeSpan) { closeSpan.style.pointerEvents = 'auto'; closeSpan.style.opacity = '1'; }
                if (loadingDiv) loadingDiv.style.display = 'none';
                newAddBtn.disabled = false;
                newAddBtn.textContent = '+ Добавить фото';
            };
            fileInput.click();
        };
    }
    
    modal.style.display = 'block';
}

// Изменение типа кровли
function changeRoofType(newType) {
    const sys = systemsData.roof;
    sys.roofType = newType;
    sys.defectLib = DEFECT_LIB.roof[newType];
    saveToLocal();
    renderSystem('roof', 'roof-root');
}

function buildSelectOptions(defectArray, selectedIdx) {
    return defectArray.map((d, idx) => `<option value="${idx}" ${selectedIdx === idx ? 'selected' : ''}>${d.name} [${d.interval}]</option>`).join('');
}

// Отрисовка системы (без изменений, но теперь photoIds вместо photos)
function renderSystem(systemKey, containerId) {
    const sys = systemsData[systemKey];
    const container = document.getElementById(containerId);
    if (!container) return;
    
    let html = `<div class="system-card"><h3>${sys.name}</h3>`;
    
    if (systemKey === 'roof') {
        let roofTypeOptions = {
            rolled: "Рулонная/мастичная",
            metal: "Металлическая",
            tile: "Черепичная",
            asbestos: "Хризотилцементная",
            combined: "Совмещённая ЖБ"
        };
        html += `<div class="roof-type-selector"><label>Тип кровли: </label>
                 <select id="roofTypeSelect">${Object.entries(roofTypeOptions).map(([v, l]) => `<option value="${v}" ${sys.roofType === v ? 'selected' : ''}>${l}</option>`).join('')}</select></div>`;
    }
    
    html += `<div style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-outline btn" onclick="exportSystemCSV('${systemKey}')">📊 CSV</button>
                <button class="btn-outline btn" onclick="exportSystemTXT('${systemKey}')">📄 TXT</button>
                <button class="btn-outline btn" onclick="exportSystemZip('${systemKey}')">📦 ZIP+фото</button>
             </div>`;
    
    for (let eIdx = 0; eIdx < sys.elements.length; eIdx++) {
        const elem = sys.elements[eIdx];
        html += `<div style="margin-bottom:20px; border-top:2px solid #cde0ec; padding-top:12px;">
                    <strong><input type="text" class="elem-name" data-sys="${systemKey}" data-eidx="${eIdx}" value="${escapeHtml(elem.name)}" style="width: 200px; display: inline-block;"></strong> 
                    <span style="float:right;">Pк: <input type="number" step="any" class="elem-total-size" data-sys="${systemKey}" data-eidx="${eIdx}" value="${elem.totalSize}" style="width:90px;"> м²/м/шт</span>
                 </div>`;
        html += `<table class="elem-table"><thead><tr>
                    <th>Дефект (название / интервал)</th>
                    <th>Pi</th>
                    <th>Фi, % (ред.)</th>
                    <th>Уд.вес %</th>
                    <th>Вклад %</th>
                    <th>Фото</th>
                    <th></th>
                  </thead><tbody>`;
        for (let pIdx = 0; pIdx < elem.parts.length; pIdx++) {
            const part = elem.parts[pIdx];
            const fiValue = getFiForPart(part, sys.defectLib, part.defectIdx);
            const weight = (part.defectSize / elem.totalSize) * 100;
            const contribution = fiValue * (part.defectSize / elem.totalSize);
            const photoCount = (part.photoIds && part.photoIds.length) ? part.photoIds.length : 0;
            html += `<tr>
                         <td><select class="defect-select" data-sys="${systemKey}" data-eidx="${eIdx}" data-pidx="${pIdx}">${buildSelectOptions(sys.defectLib, part.defectIdx)}</select></td>
                         <td><input type="number" step="any" class="defect-size" data-sys="${systemKey}" data-eidx="${eIdx}" data-pidx="${pIdx}" value="${part.defectSize}"></td>
                         <td><div class="fi-control"><input type="number" step="any" class="fi-input" data-sys="${systemKey}" data-eidx="${eIdx}" data-pidx="${pIdx}" value="${fiValue}"><div class="fi-buttons"><button class="fi-btn" data-boundary="lower">нижн</button><button class="fi-btn" data-boundary="middle">средн</button><button class="fi-btn" data-boundary="upper">верх</button></div></div></td>
                        <td class="weight-cell">${weight.toFixed(2)}%</td>
                        <td class="contrib-cell">${contribution.toFixed(2)}%</td>
                        <td><button class="btn-icon" onclick="openPhotoModal('${systemKey}', ${eIdx}, ${pIdx})">📷 (${photoCount})</button></td>
                        <td><button class="remove-part" data-sys="${systemKey}" data-eidx="${eIdx}" data-pidx="${pIdx}">✖</button></td>
                      </tr>`;
        }
        html += `<tr><td colspan="7"><button class="add-part" data-sys="${systemKey}" data-eidx="${eIdx}">+ Добавить дефект к элементу</button></td></tr>`;
        html += `</tbody></table>`;
    }
    html += `<button class="add-element" data-sys="${systemKey}">+ Добавить новый элемент системы</button>`;
    
    // Протокол расчёта (полный)
    let protocol = `📋 ПРОТОКОЛ РАСЧЁТА ФИЗИЧЕСКОГО ИЗНОСА (${sys.name})\n`;
    for (let e of sys.elements) {
        for (let p of e.parts) {
            let fiCurr = getFiForPart(p, sys.defectLib, p.defectIdx);
            let pi = p.defectSize;
            let pk = e.totalSize;
            let weight = (pi / pk) * 100;
            let contrib = fiCurr * (pi / pk);
            let defectName = sys.defectLib[p.defectIdx]?.name || "дефект";
            protocol += `\n📌 Дефект "${defectName}" (элемент "${e.name}"):\n`;
            protocol += `   • Размер дефекта Pi = ${pi}, Общий размер Pк = ${pk}\n`;
            protocol += `   • Удельный вес (Pi/Pк) = ${pi} / ${pk} = ${weight.toFixed(2)}%\n`;
            protocol += `   • Физический износ участка Фi = ${fiCurr}%\n`;
            protocol += `   • Вклад в износ элемента = Фi × (Pi/Pк) = ${fiCurr} × ${(pi/pk).toFixed(4)} = ${contrib.toFixed(2)}%\n`;
        }
    }
    const stats = computeSystemStats(sys);
    protocol += `\n📊 Σ(Фi × Pi) = ${stats.totalFiPi.toFixed(2)}\n`;
    protocol += `📊 ΣPк (уникальная сумма) = ${stats.uniquePkSum.toFixed(2)}\n`;
    protocol += `📊 Износ системы = ${stats.totalFiPi.toFixed(2)} / ${stats.uniquePkSum.toFixed(2)} = ${stats.rawWear.toFixed(4)} → округлённо ${stats.roundedWear}%\n`;
    protocol += `📌 Категория: ${stats.category}`;
    
    html += `<div class="calc-protocol">${protocol.replace(/\n/g, '<br>')}</div>`;
    html += `</div>`;
    container.innerHTML = html;
    attachSystemEvents(systemKey);
    
    if (systemKey === 'roof') {
        const roofSelect = document.getElementById('roofTypeSelect');
        if (roofSelect) roofSelect.onchange = () => changeRoofType(roofSelect.value);
    }
}

// Привязка событий (без изменений, но теперь part.photoIds используется)
function attachSystemEvents(sysKey) {
    const sys = systemsData[sysKey];
    
    document.querySelectorAll(`.elem-name[data-sys="${sysKey}"]`).forEach(inp => {
        inp.onchange = () => {
            let eidx = parseInt(inp.dataset.eidx);
            sys.elements[eidx].name = inp.value;
            saveToLocal();
            renderSystem(sysKey, `${sysKey}-root`);
        };
    });
    
    document.querySelectorAll(`.elem-total-size[data-sys="${sysKey}"]`).forEach(inp => {
        inp.onchange = () => {
            let eidx = parseInt(inp.dataset.eidx);
            sys.elements[eidx].totalSize = parseFloat(inp.value) || 0;
            saveToLocal();
            renderSystem(sysKey, `${sysKey}-root`);
        };
    });
    
    document.querySelectorAll(`.defect-select[data-sys="${sysKey}"]`).forEach(sel => {
        sel.onchange = () => {
            let eidx = parseInt(sel.dataset.eidx);
            let pidx = parseInt(sel.dataset.pidx);
            let newIdx = parseInt(sel.value);
            sys.elements[eidx].parts[pidx].defectIdx = newIdx;
            let defect = sys.defectLib[newIdx];
            if (defect.name !== "Пользовательский ввод") sys.elements[eidx].parts[pidx].customFi = null;
            saveToLocal();
            renderSystem(sysKey, `${sysKey}-root`);
        };
    });
    
    document.querySelectorAll(`.defect-size[data-sys="${sysKey}"]`).forEach(inp => {
        inp.onchange = () => {
            let eidx = parseInt(inp.dataset.eidx);
            let pidx = parseInt(inp.dataset.pidx);
            sys.elements[eidx].parts[pidx].defectSize = parseFloat(inp.value) || 0;
            saveToLocal();
            renderSystem(sysKey, `${sysKey}-root`);
        };
    });
    
    document.querySelectorAll(`.fi-input[data-sys="${sysKey}"]`).forEach(inp => {
        inp.onchange = () => {
            let eidx = parseInt(inp.dataset.eidx);
            let pidx = parseInt(inp.dataset.pidx);
            let val = parseFloat(inp.value);
            sys.elements[eidx].parts[pidx].customFi = isNaN(val) ? null : val;
            saveToLocal();
            renderSystem(sysKey, `${sysKey}-root`);
        };
    });
    
    document.querySelectorAll(`.fi-btn`).forEach(btn => {
        btn.onclick = (e) => {
            e.stopPropagation();
            let row = btn.closest('tr');
            if (!row) return;
            let sel = row.querySelector('.defect-select');
            let inp = row.querySelector('.fi-input');
            if (!sel || !inp) return;
            let eidx = parseInt(sel.dataset.eidx);
            let pidx = parseInt(sel.dataset.pidx);
            let part = sys.elements[eidx].parts[pidx];
            let defectIdx = part.defectIdx;
            let boundary = btn.getAttribute('data-boundary');
            setFiBoundary(part, sys.defectLib, defectIdx, boundary);
            inp.value = getFiForPart(part, sys.defectLib, defectIdx);
            saveToLocal();
            renderSystem(sysKey, `${sysKey}-root`);
        };
    });
    
    document.querySelectorAll(`.remove-part[data-sys="${sysKey}"]`).forEach(btn => {
        btn.onclick = () => {
            let eidx = parseInt(btn.dataset.eidx);
            let pidx = parseInt(btn.dataset.pidx);
            sys.elements[eidx].parts.splice(pidx, 1);
            if (sys.elements[eidx].parts.length === 0) sys.elements.splice(eidx, 1);
            saveToLocal();
            renderSystem(sysKey, `${sysKey}-root`);
        };
    });
    
    document.querySelectorAll(`.add-part[data-sys="${sysKey}"]`).forEach(btn => {
        btn.onclick = () => {
            let eidx = parseInt(btn.dataset.eidx);
            sys.elements[eidx].parts.push({ defectIdx: 0, customFi: null, defectSize: 1.0, photoIds: [] });
            saveToLocal();
            renderSystem(sysKey, `${sysKey}-root`);
        };
    });
    
    let addElemBtn = document.querySelector(`.add-element[data-sys="${sysKey}"]`);
    if (addElemBtn) {
        addElemBtn.onclick = () => {
            let newName = prompt("Название элемента системы:", "Новый участок");
            if (newName) {
                sys.elements.push({ name: newName, totalSize: 10, parts: [{ defectIdx: 0, customFi: null, defectSize: 2, photoIds: [] }] });
                saveToLocal();
                renderSystem(sysKey, `${sysKey}-root`);
            }
        };
    }
}

function escapeHtml(str) { return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
// ======================== ЧАСТЬ 4: ЭКСПОРТНЫЕ ФУНКЦИИ (CSV, TXT, ZIP) И ИНИЦИАЛИЗАЦИЯ ========================

// Экспорт CSV для одной системы
window.exportSystemCSV = function(sysKey) {
    const sys = systemsData[sysKey];
    const address = document.getElementById('addressInput').value || "";
    const date = document.getElementById('dateInput').value || "";
    let rows = [];
    rows.push([`"Объект: ${address}"`]);
    rows.push([`"Дата: ${date}"`]);
    rows.push([`"Система: ${sys.name}"`]);
    rows.push([]);
    rows.push(["Элемент", "Pк", "Дефект (интервал)", "Pi", "Фi %", "Уд.вес %", "Вклад %", "Фото (кол-во)"]);
    for (let elem of sys.elements) {
        for (let part of elem.parts) {
            let defect = sys.defectLib[part.defectIdx] || { name: "?", interval: "" };
            let fiVal = getFiForPart(part, sys.defectLib, part.defectIdx);
            let weight = (part.defectSize / elem.totalSize) * 100;
            let contrib = fiVal * (part.defectSize / elem.totalSize);
            let photoCount = (part.photos && part.photos.length) ? part.photos.length : 0;
            let fmt = n => n.toString().replace('.', ',');
            rows.push([
                elem.name, fmt(elem.totalSize),
                `${defect.name} [${defect.interval}]`,
                fmt(part.defectSize), fmt(fiVal),
                fmt(weight), fmt(contrib), photoCount
            ]);
        }
    }
    let csvContent = rows.map(row => row.join(";")).join("\n");
    const blob = new Blob(["\uFEFF" + csvContent], {type: "text/csv;charset=utf-8;"});
    saveAs(blob, `${sys.name}_износ.csv`);
};

// Экспорт TXT протокола для одной системы (полный, с формулами)

    for (let e of sys.elements) {

            let weight = (pi/pk)*100;
            let contrib = fiCurr*(pi/pk);
            let defectName = sys.defectLib[p.defectIdx]?.name || "дефект";
            protocol += `📌 Дефект "${defectName}" (элемент "${e.name}"):\n`;
            protocol += `   • Размер дефекта Pi = ${pi}, Общий размер Pк = ${pk}\n`;
            protocol += `   • Удельный вес (Pi/Pк) = ${pi}/${pk} = ${weight.toFixed(2)}%\n`;
            protocol += `   • Физический износ участка Фi = ${fiCurr}%\n`;
            protocol += `   • Вклад в износ элемента = Фi × (Pi/Pк) = ${fiCurr} × ${(pi/pk).toFixed(4)} = ${contrib.toFixed(2)}%\n\n`;
        }
    }
    const stats = computeSystemStats(sys);
    protocol += `📊 Σ(Фi × Pi) = ${stats.totalFiPi.toFixed(2)}\n`;
    protocol += `📊 ΣPк (уникальная сумма) = ${stats.uniquePkSum.toFixed(2)}\n`;
    protocol += `📊 Износ системы = ${stats.totalFiPi.toFixed(2)} / ${stats.uniquePkSum.toFixed(2)} = ${stats.rawWear.toFixed(4)} → округлённо ${stats.roundedWear}%\n`;
    protocol += `📌 Категория: ${stats.category}`;
    const blob = new Blob([protocol], {type: "text/plain;charset=utf-8"});
    saveAs(blob, `${sys.name}_протокол.txt`);
};

                elem.name, fmt(elem.totalSize),
                `${defect.name} [${defect.interval}]`,
                fmt(part.defectSize), fmt(fiVal),
                fmt(weight), fmt(contrib), photoCount
            ]);
        }
    }
    let csvContent = csvRows.map(r => r.join(";")).join("\n");
    zip.file("report.csv", "\uFEFF" + csvContent);
    
    // TXT протокол (полный)
    let protocol = `ПРОТОКОЛ РАСЧЁТА ФИЗИЧЕСКОГО ИЗНОСА\nОбъект: ${address}\nДата: ${date}\nСистема: ${sys.name}\n\n`;
    for (let e of sys.elements) {
        for (let p of e.parts) {
            let fiCurr = getFiForPart(p, sys.defectLib, p.defectIdx);
            let pi = p.defectSize;
            let pk = e.totalSize;
            let weight = (pi/pk)*100;
            let contrib = fiCurr*(pi/pk);
            let defectName = sys.defectLib[p.defectIdx]?.name || "дефект";
            protocol += `📌 Дефект "${defectName}" (элемент "${e.name}"):\n`;
            protocol += `   • Pi = ${pi}, Pк = ${pk}\n`;
            protocol += `   • Уд.вес = ${weight.toFixed(2)}%\n`;
            protocol += `   • Фi = ${fiCurr}%\n`;
            protocol += `   • Вклад = ${contrib.toFixed(2)}%\n\n`;
        }
    }
    const stats = computeSystemStats(sys);
    protocol += `📊 Σ(Фi×Pi) = ${stats.totalFiPi.toFixed(2)}\n📊 ΣPк = ${stats.uniquePkSum.toFixed(2)}\n📊 Износ = ${stats.rawWear.toFixed(4)} → ${stats.roundedWear}%\n📌 Категория: ${stats.category}`;
    zip.file("protocol.txt", protocol);
    
        // Фото (извлечение из IndexedDB)
    for (let eIdx = 0; eIdx < sys.elements.length; eIdx++) {
        let elem = sys.elements[eIdx];
        for (let pIdx = 0; pIdx < elem.parts.length; pIdx++) {
            let part = elem.parts[pIdx];
            if (part.photoIds && part.photoIds.length) {
                let defectName = (sys.defectLib[part.defectIdx]?.name || "дефект").substring(0, 30);
                let folder = `photos/${elem.name}/дефект_${pIdx + 1}_${defectName}/`;
                for (let i = 0; i < part.photoIds.length; i++) {
                    const photoId = part.photoIds[i];
                    const blob = await getPhotoBlob(photoId);
                    if (blob) {
                        let ext = blob.type.split('/')[1] || 'jpg';
                        zip.file(folder + `photo_${i + 1}.${ext}`, blob);
                    }
                }
            }
        }
    }
	
    let content = await zip.generateAsync({ type: "blob" });
    saveAs(content, `${sys.name}_${address.substring(0,20)}.zip`);
};
